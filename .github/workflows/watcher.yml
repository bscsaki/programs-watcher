name: Programs Watcher Automation

on:
  schedule:
    - cron: '0 */4 * * *' # Automatically runs every 4 hours, 24/7
  workflow_dispatch: # Allows manual trigger button

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Create and execute standalone patch script
      env:
        WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        MONGO: ${{ secrets.MONGO_URI }}
      run: |
        cat << 'EOF' > patch_tools.py
        import os
        print("--- STARTING REPO PATCH PROCESS ---")

        # 1. Inject Secrets into config.yml
        config_path = 'config.yml'
        if os.path.exists(config_path):
            with open(config_path, 'r') as f:
                lines = f.readlines()
            for i, line in enumerate(lines):
                if 'programs_watcher:' in line:
                    parts = line.split(':', 1)
                    lines[i] = f'{parts[0]}: "{os.environ["WEBHOOK"].strip()}"\n'
                    print("[✓] Successfully injected Webhook into config.yml")
                elif 'uri:' in line:
                    parts = line.split(':', 1)
                    lines[i] = f'{parts[0]}: "{os.environ["MONGO"].strip()}"\n'
                    print("[✓] Successfully injected MongoDB URI into config.yml")
            with open(config_path, 'w') as f:
                f.writelines(lines)
        else:
            print("[X] ERROR: config.yml file missing!")

        # 2. Patch broken Bugcrowd core file
        bugcrowd_path = 'modules/platforms/bugcrowd.py'
        if os.path.exists(bugcrowd_path):
            with open(bugcrowd_path, 'r') as f:
                content = f.read()
            
            # Replaces target["in_scope"] safely regardless of quote styles
            content = content.replace('target["in_scope"]', 'target.get("in_scope", False)')
            content = content.replace("target['in_scope']", 'target.get("in_scope", False)')
            
            with open(bugcrowd_path, 'w') as f:
                f.write(content)
            print("[✓] Successfully patched bugcrowd.py line 31 structural bug")
        else:
            print("[X] ERROR: modules/platforms/bugcrowd.py file missing!")

        print("--- PATCH PROCESS COMPLETE ---")
        EOF
        python3 patch_tools.py

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute program tracker
      run: |
        python main.py
