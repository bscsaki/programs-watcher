name: Programs Watcher Automation

on:
  schedule:
    - cron: '0 */4 * * *' # Automatically runs every 4 hours, 24/7
  workflow_dispatch: # Allows you to also push a button and run it manually anytime

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Inject hidden secrets into config.yml
      env:
        WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        MONGO: ${{ secrets.MONGO_URI }}
      run: |
        python3 -c "
        import os
        with open('config.yml', 'r') as f:
            text = f.read()
        
        # Swaps out placeholders inside config.yml for your hidden environment values safely
        text = text.replace('<YOUR DISCORD WEBHOOK>', os.environ['WEBHOOK'])
        text = text.replace('mongodb://localhost:27017/', os.environ['MONGO'])
        
        with open('config.yml', 'w') as f:
            f.write(text)
        "

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute program tracker
      run: |
        python main.py
